
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shopping cart</title>
    <link rel="stylesheet" href="shopping_cart.css">
</head>
<body>
    <section class="cart-container">
          <div class="cart-left">
            <h1>Shopping Cart</h1>
            <table>
              <tr>
                <th>Product</th>
                <th>Quantity</th>
                <th>Price</th>
                
              </tr>
              <tr>
                <td>Oxford Men Running Shoe</td>
                <td>- 1 +</td>
                <td>₹4,999</td>
                <td>✖</td>
              </tr>
              <tr>
                <td>Oxford Men Running Shoe</td>
                <td>- 1 +</td>
                <td>₹4,999</td>
                <td>✖</td>
              </tr>
              <tr>
                 <td>Oxford Men Running Shoe</td>
                <td>- 1 +</td>
                <td>₹4,999</td>
                <td>✖</td>
              </tr>
            </table>
            <a href="#" class="continue">Continue Shopping</a>
          </div>
          <div class="cart-right">
            <h4>Enter coupon Code</h4>
            <div class="coupon">
              <input type="text" placeholder="COUPON CODE">
              <button>Apply Coupon</button>
            </div>
            <div class="summary">
              <p>Sub Total <span>₹4,700</span></p>
              <p>Taxes<span>₹199</span></p>
              <p>Discount<span>₹0</span></p>
              <h2>Total<span>₹4,999</span></h2>
            </div>
            <button class="pay-btn">
                pay Now ₹4,999
            </button>
            <img src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/razorpay-icon.png" alt="razorpay">
          </div>
        </section>
</body>
</html>
